name: Node.js CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        run: npm run lint --if-present

      - name: Run tests if configured
        run: npm run test --if-present

      - name: Build Chrome extension
        run: npm run build

      - name: Verify extension output
        run: |
          test -f dist/manifest.json
          test -f dist/index.html

      - name: Get extension version
        id: version
        run: |
          VERSION=$(node --input-type=module -e "
            import fs from 'node:fs';
            const manifest = JSON.parse(fs.readFileSync('./dist/manifest.json', 'utf8'));
            const version = manifest.version_name || manifest.version;
            console.log(version.replace(/[^a-zA-Z0-9._-]/g, '-'));
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension version: $VERSION"

      - name: Package extension
        run: |
          cd dist
          zip -r "../keeps-extension-${{ steps.version.outputs.version }}.zip" .

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: keeps-extension-${{ steps.version.outputs.version }}
          path: keeps-extension-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7
